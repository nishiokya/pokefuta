name: PR Checks

on:
  pull_request:

jobs:
  typecheck-and-smoke:
    name: Type-check and UI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      PORT: "3100"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_MAP_DEFAULT_CENTER_LAT: "36.0"
      NEXT_PUBLIC_MAP_DEFAULT_CENTER_LNG: "138.0"
      NEXT_PUBLIC_MAP_DEFAULT_ZOOM: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build and run UI smoke
        run: npm run smoke:ui:ci

      - name: Upload UI smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-screenshots
          path: test-results/ui-smoke
          if-no-files-found: ignore
